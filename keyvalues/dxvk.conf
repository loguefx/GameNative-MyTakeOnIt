# GameNative DXVK config — DirectX 9/10/11 → Vulkan
# Do not remove settings without reading the explanation in gamenative-steam-performance.mdc

# Async shader compilation: prevents render-thread freeze on new shaders (biggest win)
dxvk.enableAsync = True

# Compile threads: (physical cores - 1). SD 8 Gen = 6; lower-end use 3
dxvk.numCompilerThreads = 6

# Graphics Pipeline Library (Mesa Turnip 23.x+): reduces first-draw hitching
dxvk.enableGraphicsPipelineLibrary = True

# Persistent state cache: shaders survive restarts (first play slow, then smooth)
dxvk.enableStateCache = True
dxvk.stateCacheMaxSize = 256

# Memory: ~40% of device RAM. 8 GB → 3200 MB, 12 GB → 4800 MB
dxvk.deviceLocalMemoryMiB = 3200
dxvk.maxChunkSize = 256

# Frame latency and presentation
dxvk.maxFrameLatency = 1
dxvk.presentMode = MAILBOX

# Vulkan barrier optimization (tile-based Adreno)
dxvk.trackPipelineLifetime = 0

# No HUD or logging in release
DXVK_HUD = none
dxvk.logLevel = none
