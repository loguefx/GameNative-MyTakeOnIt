name: Android CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'keyvalues/**'
      - 'media/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Configure Keystore
      env:
        KEYSTORE: ${{ secrets.KEYSTORE }}
        KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
      run: |
        mkdir -p app/keystores
        b64="$(echo "$KEYSTORE" | tr -d ' \n\r\t')"
        if [ -n "$b64" ] && echo "$b64" | base64 --decode > app/keystores/keystore 2>/dev/null; then
          echo "Keystore decoded successfully."
        else
          echo "::warning::KEYSTORE secret is missing or not valid base64. Using empty file; signing will be skipped. To fix: encode your .keystore file as single-line base64 (e.g. PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes('keystore'))) and set the KEYSTORE repository secret."
          true > app/keystores/keystore
        fi
        echo "storeFile=keystores/keystore" >> app/keystores/keystore.properties
        echo "keyAlias=$KEYSTORE_KEY_ALIAS" >> app/keystores/keystore.properties
        echo "storePassword=$KEYSTORE_STORE_PASSWORD" >> app/keystores/keystore.properties
        echo "keyPassword=$KEYSTORE_KEY_PASSWORD" >> app/keystores/keystore.properties

    - name: Configure Production Keystore
      env:
        PROD_KEYSTORE: ${{ secrets.PROD_KEYSTORE }}
        PROD_KEYSTORE_KEY_ALIAS: ${{ secrets.PROD_KEYSTORE_KEY_ALIAS }}
        PROD_KEYSTORE_KEY_PASSWORD: ${{ secrets.PROD_KEYSTORE_KEY_PASSWORD }}
        PROD_KEYSTORE_STORE_PASSWORD: ${{ secrets.PROD_KEYSTORE_STORE_PASSWORD }}
      run: |
        mkdir -p app/keystores
        b64="$(echo "$PROD_KEYSTORE" | tr -d ' \n\r\t')"
        if [ -n "$b64" ] && echo "$b64" | base64 --decode > app/keystores/prod.keystore 2>/dev/null; then
          echo "Production keystore decoded successfully."
        else
          echo "::warning::PROD_KEYSTORE secret is missing or not valid base64. Using empty file; signing will be skipped."
          true > app/keystores/prod.keystore
        fi
        cat <<EOF > app/keystores/prod-keystore.properties
        keyAlias=$PROD_KEYSTORE_KEY_ALIAS
        keyPassword=$PROD_KEYSTORE_KEY_PASSWORD
        storePassword=$PROD_KEYSTORE_STORE_PASSWORD
        EOF

    - name: Inject credentials
      run: |
        cat <<EOF > local.properties
        POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
        POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}
        STEAMGRIDDB_API_KEY=${{ secrets.STEAMGRIDDB_API_KEY }}
        SUPABASE_URL=${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
        EOF

    - name: Install Android SDK Build Tools
      run: |
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        if [ ! -x "$SDKMANAGER" ]; then
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
        fi
        yes | "$SDKMANAGER" --install "build-tools;34.0.0"

    - name: Make Gradle wrapper executable
      run: chmod +x gradlew

    # #region agent log
    - name: Initialize debug log
      run: |
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H0","location":"workflow","message":"workflow_start","data":{},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
    # #endregion

    - name: Verify Room schema directory
      run: |
        echo "Contents of app/schemas:"
        ls -la app/schemas/ || true
        echo "Contents of app/schemas/app.gamenative.db.PluviaDatabase:"
        ls -la app/schemas/app.gamenative.db.PluviaDatabase/ || true
        if [ ! -d "app/schemas" ] || [ -z "$(find app/schemas -name '*.json' 2>/dev/null)" ]; then
          echo "::warning::Room schema directory missing or has no JSON files; copyRoomSchemas may report NO-SOURCE"
        fi

    - name: Write BuildConfig debug log
      run: ./gradlew :app:writeBuildConfigDebugLog -PdebugLogDir="${{ github.workspace }}"

    - name: Show debug log location
      if: always()
      run: |
        echo "Workspace: ${{ github.workspace }}"
        ls -la "${{ github.workspace }}/debug-6ad579.log" 2>/dev/null && echo "--- log contents ---" && head -20 "${{ github.workspace }}/debug-6ad579.log" || echo "File not found"

    - name: Build with Gradle
      env:
        POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        STEAMGRIDDB_API_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: ./gradlew :app:bundleRelease

    - name: Upload debug log
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: debug-buildconfig-log
        path: debug-6ad579.log

    - name: Upload debug session log
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: debug-session-log
        path: debug-e39ecc.log

    - name: Download bundletool
      run: |
        mkdir -p tools
        if [ ! -f tools/bundletool-all-1.17.2.jar ]; then
          curl -L -o tools/bundletool-all-1.17.2.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar
        fi

    - name: Extract APK from Bundle
      run: |
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H2","location":"workflow","message":"step_start","data":{"step":"extract_apk"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion
        java -jar tools/bundletool-all-1.17.2.jar build-apks --bundle=app/build/outputs/bundle/release/app-release.aab --output=app-release.apks --mode=universal
        unzip -o app-release.apks universal.apk
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H2","location":"workflow","message":"step_ok","data":{"step":"extract_apk"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion

    - name: Copy lineage file
      run: |
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H1","location":"workflow","message":"step_start","data":{"step":"copy_lineage"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion
        mkdir -p app/keystores
        cp prod-debug.lineage app/keystores/prod-debug.lineage
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H1","location":"workflow","message":"step_ok","data":{"step":"copy_lineage"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion

    - name: Dual sign universal APK
      env:
        DEBUG_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        DEBUG_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        DEBUG_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
        PROD_ALIAS: ${{ secrets.PROD_KEYSTORE_KEY_ALIAS }}
        PROD_KEY_PASS: ${{ secrets.PROD_KEYSTORE_KEY_PASSWORD }}
        PROD_STORE_PASS: ${{ secrets.PROD_KEYSTORE_STORE_PASSWORD }}
      run: |
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H3","location":"workflow","message":"step_start","data":{"step":"dual_sign"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion
        BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/34.0.0"
        if [ ! -d "$BUILD_TOOLS_DIR" ]; then
          BUILD_TOOLS_DIR="${ANDROID_SDK_ROOT}/build-tools/34.0.0"
        fi
        if [ -s app/keystores/keystore ] && [ -s app/keystores/prod.keystore ]; then
          "${BUILD_TOOLS_DIR}/apksigner" sign \
            --in universal.apk \
            --out universal-signed.apk \
            --lineage app/keystores/prod-debug.lineage \
            --ks app/keystores/keystore \
            --ks-key-alias "$DEBUG_ALIAS" \
            --ks-pass "pass:$DEBUG_STORE_PASS" \
            --key-pass "pass:$DEBUG_KEY_PASS" \
            --next-signer --ks app/keystores/prod.keystore \
            --ks-key-alias "$PROD_ALIAS" \
            --ks-pass "pass:$PROD_STORE_PASS" \
            --key-pass "pass:$PROD_KEY_PASS"
          mv universal-signed.apk universal.apk
        elif [ -s app/keystores/keystore ]; then
          "${BUILD_TOOLS_DIR}/apksigner" sign \
            --in universal.apk \
            --out universal-signed.apk \
            --ks app/keystores/keystore \
            --ks-key-alias "$DEBUG_ALIAS" \
            --ks-pass "pass:$DEBUG_STORE_PASS" \
            --key-pass "pass:$DEBUG_KEY_PASS"
          mv universal-signed.apk universal.apk
          echo "::notice::Signed with single keystore (KEYSTORE). Add PROD_KEYSTORE for dual signing."
        else
          echo "::notice::Keystore(s) missing or empty (add KEYSTORE secret to enable signing). Uploading unsigned APK."
        fi
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H3","location":"workflow","message":"step_ok","data":{"step":"dual_sign"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion

    # #region agent log
    - name: Log before upload
      run: echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H4","location":"workflow","message":"step_start","data":{"step":"upload_artifact"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
    # #endregion

    - name: Upload Artifact
      id: upload_app
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: ${{ github.workspace }}/universal.apk

    # #region agent log
    - name: Log after upload
      run: echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H4","location":"workflow","message":"step_ok","data":{"step":"upload_artifact"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
    # #endregion

    - name: Build changelog text
      id: changelog
      run: |
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H5","location":"workflow","message":"step_start","data":{"step":"changelog"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion
        text=$(jq -r '(.commits // [])[] | "• " + (.message | split("\n")[0]) + " (" + .id[0:7] + ")"' "$GITHUB_EVENT_PATH" 2>/dev/null || true)
        echo 'log<<EOF' >>"$GITHUB_OUTPUT"
        echo "${text:-No commits (manual run)}" >>"$GITHUB_OUTPUT"
        echo 'EOF' >>"$GITHUB_OUTPUT"
        # #region agent log
        echo '{"sessionId":"e39ecc","runId":"ci","hypothesisId":"H5","location":"workflow","message":"step_ok","data":{"step":"changelog"},"timestamp":'$(date +%s)000'}' >> debug-e39ecc.log
        # #endregion

    - name: Post to Discord
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        artifact_url="https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/app-release-signed.zip"
        payload='{"content":"**New Android build**\nDownload: '"$artifact_url"'\n\nChanges:\n'"${{ steps.changelog.outputs.log }}"'"}'
        if [ -n "$DISCORD_WEBHOOK_URL" ]; then
          curl -H 'Content-Type: application/json' -d "$payload" "$DISCORD_WEBHOOK_URL"
        fi
